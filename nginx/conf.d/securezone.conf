# ══════════════════════════════════════════════════════════════════
#  SecureZone — Configuration Nginx
#  - Port 80  : redirige vers HTTPS (prod) ou sert directement (dev)
#  - Port 443 : HTTPS avec terminaison SSL
#  - /api/v1/ : proxy vers le backend FastAPI
#  - /        : fichiers statiques du frontend React
# ══════════════════════════════════════════════════════════════════

# Upstream FastAPI backend
upstream securezone_backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (décommenter en production) ──────────
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# ── Serveur principal ───────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl;              # Décommenter en production
    server_name localhost;

    # Certificats SSL (générer avec : scripts/gen_certs.sh)
    # ssl_certificate     /etc/nginx/certs/securezone.crt;
    # ssl_certificate_key /etc/nginx/certs/securezone.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Health check Nginx ──────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── API Backend (FastAPI) ───────────────────────────────────
    location /api/ {
        proxy_pass         http://securezone_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts généreux pour les scans longs (VM Engine)
        proxy_read_timeout    600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
    }

    # ── Documentation API (Swagger) ────────────────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://securezone_backend;
        proxy_set_header Host $host;
    }

    # ── Frontend React (SPA) ───────────────────────────────────
    # En développement : proxy vers Vite dev server
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;

        # Vite HMR (Hot Module Replacement) WebSocket
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend React (production build) ──────────────────────
    # Décommenter en production (après npm run build)
    # location / {
    #     root  /usr/share/nginx/html;
    #     index index.html;
    #     try_files $uri $uri/ /index.html;   # SPA routing
    #
    #     # Cache agressif pour les assets hachés (JS/CSS/images)
    #     location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #     }
    # }

    # ── Rapports PDF téléchargeables ───────────────────────────
    location /reports/ {
        alias /app/reports/;
        add_header Content-Disposition "attachment";
        # Accès restreint — vérification JWT côté app nécessaire
    }
}
